<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 — Primera Fase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --pitch:#0E2B20;
  --pitch-2:#143828;
  --grass:#22A565;
  --board:#0A1F17;
  --gold:#F2C14E;
  --cream:#EFF5F0;
  --line:rgba(255,255,255,.10);
  --red:#E0574F;
  --ok:#3BC47C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--pitch);
  background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 64px, transparent 64px 128px);
  color:var(--cream);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:920px;margin:0 auto;padding:0 14px 80px}
header{padding:26px 0 14px;text-align:center}
.kicker{font-family:'Saira Condensed';font-weight:600;letter-spacing:.28em;font-size:12px;color:var(--grass);text-transform:uppercase}
h1{font-family:'Saira Condensed';font-weight:800;font-size:clamp(34px,7vw,52px);line-height:.95;text-transform:uppercase;letter-spacing:.01em;margin:6px 0 2px}
h1 .y{color:var(--gold)}
.sub{font-size:12.5px;color:#FFFFFF}
.statusbar{
  display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:16px 0 6px;
}
button{
  font-family:'Saira Condensed';font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line);border-radius:8px;background:var(--pitch-2);color:var(--cream);
  padding:10px 16px;cursor:pointer;transition:transform .08s, background .15s;
}
button:hover{background:#1A4633}
button:active{transform:scale(.97)}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
button.primary{background:var(--grass);color:#06291A;border-color:transparent}
button.primary:hover{background:#2BBE76}
button:disabled{opacity:.5;cursor:wait}
.note{font-size:12px;color:rgba(255,255,255,.5);text-align:center;min-height:16px;margin-bottom:8px}
.note.err{color:var(--red)}
.note.ok{color:var(--ok)}

.tabs{display:flex;gap:6px;justify-content:center;margin:10px 0 18px;flex-wrap:wrap}
.tab{flex:1;min-width:120px;font-size:13px}
@media(min-width:600px){.tab{flex:0 1 180px;font-size:14px}}
.tab.active{background:var(--gold);color:#3A2C06;border-color:transparent}

/* ----- marcador / leaderboard ----- */
.boardcard{background:var(--board);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.boardhead{display:grid;grid-template-columns:40px 1fr 70px 56px;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);
  font-family:'Saira Condensed';font-weight:600;letter-spacing:.14em;font-size:14px;color:#FFFFFF;text-transform:uppercase}
.boardhead .r{text-align:right}
.rowp{display:grid;grid-template-columns:40px 1fr 70px 56px;gap:8px;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.rowp:last-child{border-bottom:none}
.pos{font-family:'JetBrains Mono';font-weight:700;font-size:14px;text-align:center;color:#FFFFFF}
.rowp.top3 .pos{color:var(--gold)}
.pname{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pts{font-family:'JetBrains Mono';font-weight:700;font-size:18px;text-align:center}
.exa{font-family:'JetBrains Mono';font-size:12px;text-align:center;color:rgba(255,255,255,.45)}
.ptlive{font-family:'JetBrains Mono';font-weight:700;font-size:10px;color:var(--red);vertical-align:super;margin-left:2px;text-shadow:0 0 2px rgba(0,0,0,.45)}
.livebanner{display:flex;align-items:center;gap:8px;justify-content:center;background:#5A1714;border:1px solid rgba(224,87,79,.55);color:#FFFFFF;border-radius:10px;padding:9px 14px;margin-bottom:12px;font-family:'Saira Condensed';font-weight:600;letter-spacing:.12em;font-size:13px;text-transform:uppercase;animation:livepulse 1.4s ease-in-out infinite}
.livedot{color:var(--red);font-size:11px}
.grouplive{font-family:'Saira Condensed';font-weight:700;font-size:13px;color:var(--red);letter-spacing:.08em;vertical-align:3px;animation:liveblink 1.4s ease-in-out infinite}
.teamlivedot{color:var(--red);font-size:9px;vertical-align:1px;animation:liveblink 1.4s ease-in-out infinite}
@keyframes liveblink{0%,100%{opacity:1}50%{opacity:.4}}
.premio{font-size:10px;font-weight:700;letter-spacing:.08em;color:#06291A;background:var(--gold);border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:2px}
.scorer-row{display:grid;grid-template-columns:40px 1fr 1fr 50px;gap:8px;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.scorer-row:last-child{border-bottom:none}
.scorer-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scorer-team{font-size:12px;color:#FFFFFF;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scorer-goals{font-family:'JetBrains Mono';font-weight:700;font-size:18px;text-align:center;color:var(--gold)}
.flag{width:20px;height:20px;object-fit:cover;border-radius:50%;margin-right:6px;vertical-align:middle;box-shadow:0 0 0 1.5px var(--line),0 1px 2px rgba(0,0,0,.45)}
.flag-r{margin-right:0;margin-left:6px}
.groupteam .flag{margin-right:0}
@media (max-width:520px){ .scorer-row{grid-template-columns:32px 1fr 76px 40px;padding:10px 12px} }
.card-row{display:grid;grid-template-columns:1fr 1fr 70px 70px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.card-row:last-child{border-bottom:none}
.card-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-country{display:flex;align-items:center;gap:5px;font-size:11px;color:#FFFFFF;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-badge{display:flex;align-items:center;justify-content:center;gap:3px;font-family:'JetBrains Mono';font-weight:700;font-size:12px;height:28px;border-radius:4px}
.card-badge-yellow{background:rgba(255,215,0,.2);color:#FFD700}
.card-badge-red{background:rgba(255,107,107,.2);color:#FF6B6B}
.card-badge.empty{opacity:.3}
@media (max-width:520px){ .card-row{grid-template-columns:1fr 1fr 65px 65px;gap:6px;padding:9px 12px}.card-name{font-size:13px}.card-country{font-size:10px}.card-badge{font-size:11px;height:26px} }

/* ----- partidos ----- */
.match-team{font-family:'Saira Condensed';font-weight:600;font-size:16px;letter-spacing:.02em;text-transform:uppercase;line-height:1.12;display:flex;align-items:center;gap:7px;min-width:0}
.match-team.t1{text-align:right;justify-content:flex-end}
.match-team .tname{min-width:0;overflow-wrap:break-word;white-space:normal}
.match-team .flag{flex:0 0 auto;margin:0}
.dayhdr{font-family:'Saira Condensed';font-weight:800;font-size:20px;letter-spacing:.06em;text-transform:uppercase;margin:22px 4px 8px;color:var(--gold)}.daymatches{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:20px;align-items:start}@media(min-width:768px){.daymatches{grid-template-columns:repeat(2,1fr);align-items:start}}
.match{background:var(--board);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.match.is-final{border-left-color:var(--ok)}
.match.is-live{border-left-color:var(--red)}
.mrow{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;gap:9px;padding:16px 14px 12px;cursor:pointer}
.team{font-family:'Saira Condensed';font-weight:600;font-size:17px;letter-spacing:.03em;text-transform:uppercase;line-height:1.05}
.team.t1{text-align:right}
.score{
  font-family:'JetBrains Mono';font-weight:700;font-size:22px;text-align:center;
  background:#05140D;border:1px solid var(--line);border-radius:8px;padding:6px 0;color:var(--gold);
}
.score.pending{color:#FFFFFF;font-size:16px;letter-spacing:.1em}
.score.live{color:#FFFFFF;background:#5A1714;border-color:rgba(224,87,79,.55);animation:livepulse 1.4s ease-in-out infinite}
.score .min-txt{font-size:12px;color:rgba(255,255,255,.7);font-weight:500;display:block;margin-top:2px}
.livetag{color:var(--red);font-weight:700;letter-spacing:.06em}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(224,87,79,.45)}50%{box-shadow:0 0 0 4px rgba(224,87,79,0)}}
.minfo{display:flex;justify-content:space-between;align-items:center;padding:0 14px 12px;font-size:11.5px;color:#FFFFFF}
.gtag{font-family:'JetBrains Mono';font-weight:700;color:#FFFFFF}
.mexp{border-top:1px solid var(--line);background:#081A12;padding:10px 14px 14px;display:none;pointer-events:none}
.match.open .mexp{display:block;pointer-events:auto}
.predrow{display:grid;grid-template-columns:1fr 64px 36px;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.predrow:last-child{border:none}
.predscore{font-family:'JetBrains Mono';font-weight:500;text-align:center;color:rgba(255,255,255,.75)}
.predpts{font-family:'JetBrains Mono';font-weight:700;text-align:right}
.p7{color:var(--gold)} .p43{color:var(--ok)} .p1{color:#8FB8A4} .p0{color:rgba(255,255,255,.28)}
/* prediction rows con colores por puntos */
.pred-row{display:grid;grid-template-columns:1fr 40px 40px;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;border-radius:4px}
.pred-row:last-child{border-bottom:none}
.pred-name{font-family:'JetBrains Mono';font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.85)}
.pred-pred{font-family:'JetBrains Mono';font-weight:600;font-size:14px;text-align:center;color:rgba(255,255,255,.9)}
.pred-pts{font-family:'JetBrains Mono';font-weight:700;font-size:16px;text-align:center;padding:4px 8px;border-radius:4px}
.pred-7{background:rgba(47,213,133,.2);color:var(--ok);border:1px solid var(--ok)}
.pred-4{background:rgba(255,221,51,.15);color:#FFD733;border:1px solid rgba(255,221,51,.4)}
.pred-3{background:rgba(255,193,7,.12);color:#FFC107;border:1px solid rgba(255,193,7,.3)}
.pred-1{background:rgba(255,152,0,.12);color:#FF9800;border:1px solid rgba(255,152,0,.3)}
.pred-0{background:rgba(239,83,80,.15);color:#EF5350;border:1px solid rgba(239,83,80,.3)}
.editzone{display:flex;gap:8px;align-items:center;justify-content:center;padding:10px 0 4px;flex-wrap:wrap}
.editzone input{
  width:56px;font-family:'JetBrains Mono';font-weight:700;font-size:18px;text-align:center;
  background:#05140D;border:1px solid var(--line);border-radius:8px;color:var(--cream);padding:7px 0;
}
.editzone input:focus{outline:2px solid var(--grass)}
.editzone button{padding:8px 14px;font-size:13px}
.del{color:var(--red)}

/* ----- vista grupos ----- */
.groupsection{}
.grouptitle{font-family:'Saira Condensed';font-weight:800;font-size:22px;letter-spacing:.06em;text-transform:uppercase;margin:0 0 12px;color:#FFFFFF}
.groupcard{background:#1A1A1A;border:1px solid var(--line);border-radius:12px;overflow:hidden}#vGrupos>div{display:grid;grid-template-columns:1fr;gap:16px;max-width:1400px;margin:0 auto;padding:0 20px}@media(min-width:1024px){#vGrupos>div{grid-template-columns:repeat(2,1fr)}}@media(min-width:1600px){#vGrupos>div{grid-template-columns:repeat(3,1fr)}}
.grouphead{display:grid;grid-template-columns:1fr 28px 28px 28px 28px 32px 32px 36px 40px;gap:6px;padding:12px 14px;font-family:'JetBrains Mono';font-weight:800;font-size:14px;color:#FFFFFF;text-transform:uppercase;border-bottom:1px solid var(--line);min-height:40px}
.grouphead div:first-child{text-align:left}
.groupteam{display:grid;grid-template-columns:1fr 28px 28px 28px 28px 32px 32px 36px 40px;gap:6px;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);font-family:'JetBrains Mono';font-size:13px;min-height:44px}.qualified-box{border:1px solid var(--ok);border-radius:6px;overflow:hidden;margin-bottom:8px}


.groupteam:last-child{border-bottom:none}
.tname{display:flex;align-items:center;gap:6px;min-width:0}
.truncate{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tstat{text-align:center;color:rgba(255,255,255,.75)}
.tpts{text-align:center;color:var(--grass);font-weight:700;font-size:15px}
@media (max-width:520px){ .grouphead,.groupteam{grid-template-columns:1fr 20px 20px 20px 20px 24px 24px 28px 32px;font-size:11px;padding:10px 8px;gap:4px;min-height:40px} }
@media (max-width:520px){
  .team{font-size:14.5px}
  .boardhead,.rowp{grid-template-columns:32px 1fr 56px 44px;padding-left:12px;padding-right:12px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} }

/* ===== PREVIEW: área central VERDE MÁS CLARO ===== */
.boardcard,.match{background:#1A1A1A;border-color:rgba(255,255,255,.12)}
.boardhead{border-bottom-color:rgba(255,255,255,.12)}
.score{background:#0D0D0D;border-color:rgba(255,255,255,.12)}
.mexp{background:#141414;border-top-color:rgba(255,255,255,.12)}
.editzone input{background:#0D0D0D;border-color:rgba(255,255,255,.14)}
/* Remover spinners de inputs type="number" */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type="number"] {
  -moz-appearance: textfield;
}

/* ===== TAB EN VIVO ===== */
.tab-envivo.active{background:var(--red)!important;color:#fff!important}
.tab-envivo .livedot{animation:liveblink 1.4s ease-in-out infinite}
.lv-wrap{padding:0 2px}
.lv-empty{text-align:center;color:rgba(255,255,255,.55);padding:40px 16px;font-size:14px}
.lv-status{text-align:center;font-size:11.5px;color:#FFFFFF;margin:4px 0 14px;min-height:14px}
.lv-status.err{color:var(--red)}
.lv-card{margin-bottom:16px}
.lv-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:20px 16px 16px;background:linear-gradient(180deg,#5A1714 0%,#1A1A1A 120%)}
.lv-tm{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;min-width:0}
.lv-tm img{width:48px;height:48px;object-fit:cover;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.15),0 2px 6px rgba(0,0,0,.5)}
.lv-tm-name{font-family:'Saira Condensed';font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.04em;line-height:1.1}
.lv-mid{text-align:center;min-width:96px}
.lv-score{font-family:'JetBrains Mono';font-weight:700;font-size:36px;color:#fff;line-height:1}
.lv-clock{display:inline-block;margin-top:8px;font-family:'Saira Condensed';font-weight:700;font-size:12px;letter-spacing:.1em;color:var(--red);text-transform:uppercase}
.lv-clock.ft{color:var(--ok)}
.lv-clock .livedot{font-size:9px;vertical-align:1px;animation:liveblink 1.4s ease-in-out infinite}
.lv-section{border-top:1px solid rgba(255,255,255,.1);padding:14px 16px}
.lv-section h4{font-family:'Saira Condensed';font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#FFFFFF;margin-bottom:12px;text-align:center}
.lv-event{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;color:rgba(255,255,255,.9)}
.lv-event .lv-ev-min{font-family:'JetBrains Mono';font-weight:700;font-size:12px;color:#FFFFFF;min-width:34px}
.lv-event .lv-ev-ico{font-size:13px;width:16px;text-align:center}
.lv-event .lv-ev-side{margin-left:auto;font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase}
.lv-stat{margin-bottom:12px}
.lv-stat:last-child{margin-bottom:0}
.lv-stat-top{display:flex;justify-content:space-between;font-family:'JetBrains Mono';font-weight:700;font-size:13px;margin-bottom:4px}
.lv-stat-lbl{text-align:center;font-size:10.5px;color:#FFFFFF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.lv-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.08)}
.lv-bar .a{background:var(--grass)}
.lv-bar .b{background:var(--gold)}
.lv-xi{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.lv-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.lv-cols.solo{grid-template-columns:1fr}
@media (max-width:640px){.lv-cols{grid-template-columns:1fr;gap:10px}}
.lv-stat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.lv-stat-head .tm{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.lv-stat-head .tm img{width:28px;height:28px;object-fit:cover;border-radius:50%;box-shadow:0 0 0 1.5px rgba(255,255,255,.15)}
.lv-stat-head .tm-name{font-family:'Saira Condensed';font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;text-align:center;line-height:1.05;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.lv-stat-head .vs{font-family:'JetBrains Mono';font-size:10px;color:rgba(255,255,255,.4);padding:0 6px}
.lv-col-izq{display:flex;flex-direction:column}
.lv-col-izq .lv-scoreboard{border-radius:12px 12px 0 0}
.lv-stats-wrap{border:1px solid rgba(255,255,255,.12);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.lv-stats-wrap .lv-section{border-top:none}
.lv-col-der{border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden}
.lv-col-der .lv-section{border-top:none}
.lv-xi-col h5{font-family:'Saira Condensed';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.7);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.lv-xi-col h5 img{width:18px;height:18px;border-radius:50%;object-fit:cover}
.lv-xi-p{font-size:12px;padding:3px 0;color:rgba(255,255,255,.82);display:flex;gap:6px}
.lv-xi-p .num{font-family:'JetBrains Mono';color:#FFFFFF;min-width:20px}
@media (max-width:520px){
  .lv-score{font-size:30px}
  .lv-tm img{width:40px;height:40px}
  .lv-tm-name{font-size:12.5px}
  .lv-xi{grid-template-columns:1fr;gap:10px}
  #simulationPanel{transition:max-height .3s ease-out, opacity .3s ease-out;opacity:1}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="kicker">Canadá · México · USA</div>
  <h1>Quiniela Mundial <span class="y">2026</span></h1>
  <div class="sub">Primera fase · 29 participantes · Pote $290 — 1° $203 · 2° $58 · 3° $29</div>
</header>

<div class="statusbar">
  <button class="primary" id="btnFetch">⟳ Actualizar</button>
</div>
<div class="note" id="note" aria-live="polite" aria-atomic="true">Los resultados se cargan solos desde la hoja del promotor.</div>

<div class="tabs" role="tablist" aria-label="Vistas de la quiniela">
  <button class="tab active" data-v="tabla" role="tab" id="tab-tabla" aria-controls="vTabla" aria-selected="true">Posiciones</button>
  <button class="tab tab-envivo" data-v="envivo" role="tab" id="tab-envivo" aria-controls="vEnvivo" aria-selected="false" style="display:none"><span class="livedot" style="margin-right:5px">●</span>En Vivo 1</button>
  <button class="tab tab-envivo" data-v="envivo2" role="tab" id="tab-envivo2" aria-controls="vEnvivo2" aria-selected="false" style="display:none"><span class="livedot" style="margin-right:5px">●</span>En Vivo 2</button>
  <button class="tab" data-v="partidos" role="tab" id="tab-partidos" aria-controls="vPartidos" aria-selected="false">Partidos</button>
  <button class="tab" data-v="grupos" role="tab" id="tab-grupos" aria-controls="vGrupos" aria-selected="false">Grupos</button>
  <button class="tab" data-v="goleadores" role="tab" id="tab-goleadores" aria-controls="vGoleadores" aria-selected="false">Goleadores</button>
  <button class="tab" data-v="tarjetas" role="tab" id="tab-tarjetas" aria-controls="vTarjetas" aria-selected="false">Tarjetas</button>
  <button class="tab" data-v="instrucciones" role="tab" id="tab-instrucciones" aria-controls="vInstrucciones" aria-selected="false">Instrucciones</button>
</div>

<div id="vTabla" role="tabpanel" aria-labelledby="tab-tabla" tabindex="0"></div>

// Auto-detect today's date and filter to it
function initializeFilterDate(){
  const today = new Date();
  const dd = String(today.getDate()).padStart(2, '0');
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const todayStr = `${dd}/${mm}`; // Formato: "DD/MM"
  
  // Obtener todas las fechas únicas
  const allDates = [...new Set(DATA.matches.map(m => m.date))];
  
  // Si hoy es una fecha de partidos, seleccionar esa fecha
  if(allDates.includes(todayStr)){
    gruposFilterDate = todayStr;
  }
  // Si no, dejar null (mostrar todas)
  else {
    gruposFilterDate = null;
  }
  
  renderPartidos();
}

// Inicializar al cargar
window.addEventListener('load', () => {
  initializeFilterDate();
  // Restaurar tab activo desde localStorage
  const activeTab = localStorage.getItem('activeTab') || 'tabla';
  const tabBtn = document.querySelector(`[data-v="${activeTab}"]`);
  if(tabBtn) tabBtn.click();
  
  // Restaurar estado del panel de simulación
  setTimeout(() => {
    const panelOpen = localStorage.getItem('simulationPanelOpen') === 'true';
    const panel = document.getElementById('simulationPanel');
    const btn = document.getElementById('toggleSimulation');
    if(panel && btn) {
      if(!panelOpen) {
        panel.style.maxHeight = '0px';
        panel.style.opacity = '0';
        panel.style.overflow = 'hidden';
        btn.textContent = '🎲 Simular Resultados ▶';
      } else {
        panel.style.maxHeight = '1000px';
        panel.style.opacity = '1';
        btn.textContent = '🎲 Simular Resultados ▼';
      }
    }
  }, 100);
});

function points(p1,p2,r1,r2){
  if(r1==null||r2==null||p1==null||p2==null) return null;
  if(p1===r1 && p2===r2) return 7;
  const winOK = Math.sign(p1-p2)===Math.sign(r1-r2);
  const oneGoal = (p1===r1)||(p2===r2);
  if(winOK && oneGoal) return 4;
  if(winOK) return 3;
  if(oneGoal) return 1;
  return 0;
}

function simulateResult(matchId, g1, g2){
  if(g1===null || g2===null || g1<0 || g2<0) delete SIMULATED_RESULTS[matchId];
  else SIMULATED_RESULTS[matchId]=[Number(g1),Number(g2)];

function standings(){
  const arr = DATA.participants.map((name,i)=>{
    let conf=0, live=0, exact=0;
    DATA.matches.forEach(m=>{
      const rf=RESULTS[m.id];
      const rl=LIVE[m.id];
      const rs=SIMULATED_RESULTS[m.id];
      // PRIORIDAD: REAL > SIMULADO > LIVE (ignora LIVE si hay SIMULADO)
      const r = rf || rs || rl;
      if(r){
        const pt=points(m.preds[i][0],m.preds[i][1],r[0],r[1]);
        if(pt!=null){
          if(rf) {conf+=pt; if(pt===7)exact++;} // Real es definitivo
          else if(rs) {live+=pt; if(pt===7)exact++;} // Simulado es provisional
          else if(rl) {live+=pt; if(pt===7)exact++;} // EN VIVO es provisional
        }
      }
    });
    return {name, conf, live, tot:conf+live, exact, i};
  }).sort((a,b)=> b.tot-a.tot || b.exact-a.exact || a.name.localeCompare(b.name));
  arr.forEach(s=>{ s.rank = 1 + arr.filter(x=> x.tot > s.tot).length; });
  return arr;
}

// Escala de 3 colores estilo Excel: rojo (min) -> amarillo (mediana) -> verde (max)
const SCALE = {r:[248,105,107], y:[255,235,132], g:[99,190,123]};
function lerp(a,b,t){ return a.map((x,i)=>Math.round(x+(b[i]-x)*t)); }
function ptsColor(v,vals){
  const min=Math.min(...vals), max=Math.max(...vals);
  if(max===min) return null;
  const sorted=[...vals].sort((a,b)=>a-b);
  const mid=sorted[Math.floor(sorted.length/2)];
  let c;
  if(v<=mid) c = lerp(SCALE.r, SCALE.y, mid>min ? (v-min)/(mid-min) : 1);
  else c = lerp(SCALE.y, SCALE.g, max>mid ? (v-mid)/(max-mid) : 1);
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

/* ---------- lectura del Google Sheet (hoja RESULTADOS) ---------- */
async function loadResults(silent){
  if(!silent) setNote('Actualizando…');
  try{
    const base=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
    // Intenta primero con el nombre de pestaña, luego sin él (usa la primera pestaña)
    let txt=await (await fetch(base+'&sheet=RESULTADOS')).text();
    
    // Si hay error, intenta sin especificar la pestaña
    if(txt.indexOf('"errors"')!==-1 || txt.indexOf('invalid_query')!==-1){
      console.log('Hoja RESULTADOS no encontrada, intentando la primera pestaña...');
      txt=await (await fetch(base)).text();
    }
    
    // Si aún hay error, mostrar mensaje detallado
    if(txt.indexOf('"errors"')!==-1){
      throw new Error('No se pudo acceder al Sheet. Verifica que esté compartido como "Cualquiera con el enlace: Lector"');
    }
    
    const js=JSON.parse(txt.substring(txt.indexOf('(')+1, txt.lastIndexOf(')')));
    
    if(!js.table || !js.table.rows){
      throw new Error('Sheet no tiene datos o estructura incorrecta');
    }
    
    const nuevo={}, vivo={}, minutos={};
    (js.table.rows||[]).forEach(row=>{
      const c=row.c||[];
      const id = c[0]&&c[0].v!=null ? Number(c[0].v) : null;
      const g1 = c[5]&&c[5].v!=null ? Number(c[5].v) : null;
      const g2 = c[6]&&c[6].v!=null ? Number(c[6].v) : null;
      const estado = c[7]&&c[7].v!=null ? String(c[7].v).toUpperCase().trim() : '';
      const minuto = c[10]&&c[10].v!=null ? String(c[10].v).trim() : '';
      if(id!=null && Number.isInteger(g1) && Number.isInteger(g2)){
        if(estado==='FINAL') nuevo[id]=[g1,g2];
        else if(estado==='EN VIVO') vivo[id]=[g1,g2];
        if(minuto) minutos[id]=minuto;
      }
    });
    RESULTS=nuevo; LIVE=vivo; MINUTOS=minutos; lastUpdate=new Date();
    renderAll();
    const nLive=Object.keys(LIVE).length;
    setNote(`${Object.keys(RESULTS).length} partido(s) final(es)${nLive?` · ${nLive} en vivo ahora`:''}.`,'ok');
    loadGoleadores();
    loadTarjetas();
  }catch(e){
    console.error('Error al cargar resultados:', e);
    setNote('❌ No se pudo leer la hoja. Verifica: 1) Compartida como "Cualquiera con el enlace: Lector", 2) Pestaña existe y se llama "RESULTADOS" o es la primera pestaña','err');
  }
}

async function loadTarjetas(){
  try{
    const base=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
    const txt=await (await fetch(base+'&sheet=TARJETAS')).text();
    if(txt.indexOf('"errors"')!==-1){ TARJETAS=[]; renderTarjetas(); return; }
    const js=JSON.parse(txt.substring(txt.indexOf('(')+1, txt.lastIndexOf(')')));
    const arr=[];
    (js.table.rows||[]).forEach(row=>{
      const c=row.c||[];
      const jugador=c[0]&&c[0].v!=null?String(c[0].v):'';
      const sel=c[1]&&c[1].v!=null?String(c[1].v):'';
      const amarillas=c[2]&&c[2].v!=null?Number(c[2].v):0;
      const rojas=c[3]&&c[3].v!=null?Number(c[3].v):0;
      if(jugador && (amarillas>0 || rojas>0)) arr.push({jugador, sel, amarillas, rojas});
    });
    arr.sort((a,b)=> (b.amarillas+b.rojas)-(a.amarillas+a.rojas) || a.jugador.localeCompare(b.jugador));
    TARJETAS=arr;
  }catch(e){ TARJETAS=[]; }
  renderTarjetas();
}

  'BELGICA':'be','EGIPTO':'eg','IRAN':'ir','NUEVA ZELANDA':'nz',
  'ARABIA SAUDITA':'sa','CABO VERDE':'cv','ESPANA':'es','URUGUAY':'uy',
  'FRANCIA':'fr','IRAQ':'iq','NORUEGA':'no','SENEGAL':'sn',
  'ARGELIA':'dz','ARGENTINA':'ar','AUSTRIA':'at','JORDANIA':'jo',
  'COLOMBIA':'co','PORTUGAL':'pt','RD CONGO':'cd','UZBEKISTAN':'uz',
  'CROACIA':'hr','GHANA':'gh','INGLATERRA':'gb-eng','PANAMA':'pa'
};
function flagImg(name, side){
  const iso = FLAGS[String(name||'').toUpperCase().trim()];
  if(!iso) return '';
  const cls = side==='right' ? 'flag flag-r' : 'flag';
  return `<img class="${cls}" src="https://flagcdn.com/w80/${iso}.png" alt="" loading="lazy">`;
}

async function loadGoleadores(){
  try{
    const base=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
    const txt=await (await fetch(base+'&sheet=GOLEADORES')).text();
    if(txt.indexOf('"errors"')!==-1){ GOLEADORES=[]; renderGoleadores(); return; }
    const js=JSON.parse(txt.substring(txt.indexOf('(')+1, txt.lastIndexOf(')')));
    const arr=[];
    (js.table.rows||[]).forEach(row=>{
      const c=row.c||[];
      const jugador=c[0]&&c[0].v!=null?String(c[0].v):'';
      const sel=c[1]&&c[1].v!=null?String(c[1].v):'';
      const goles=c[2]&&c[2].v!=null?Number(c[2].v):null;
      if(jugador && Number.isFinite(goles)) arr.push({jugador, sel, goles});
    });
    arr.sort((a,b)=> b.goles-a.goles || a.jugador.localeCompare(b.jugador));
    GOLEADORES=arr;
  }catch(e){ GOLEADORES=[]; }
  renderGoleadores();
}

function renderGoleadores(){
  const el=document.getElementById('vGoleadores'); if(!el) return;
  if(!GOLEADORES.length){
    el.innerHTML=`<div class="note" style="margin-top:8px">Aún no hay goleadores cargados. La tabla se llena sola desde la hoja a medida que se juegan los partidos.</div>`;
    return;
  }
  let h=`<div class="boardcard"><div class="boardhead" style="grid-template-columns:40px 1fr 1fr 50px"><div style="text-align:center">#</div><div>Jugador</div><div>Selección</div><div style="text-align:center">Goles</div></div>`;
  GOLEADORES.forEach(g=>{
    const rank = 1 + GOLEADORES.filter(x=> x.goles > g.goles).length; // estilo RANK
    const posColor = rank===1?'color:var(--gold)':rank===2?'color:#C9CDD3':rank===3?'color:#CD7F32':'';
    h+=`<div class="scorer-row">
      <div class="pos" style="${posColor}">${rank}</div>
      <div class="scorer-name">${g.jugador}</div>
      <div class="scorer-team">${flagImg(g.sel)}${g.sel}</div>
      <div class="scorer-goals">${g.goles}</div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function norm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z ]/g,'').trim(); }
function matchesTeam(quinielaName, espnName){
  const variants = ESPN_NAMES[String(quinielaName||'').toUpperCase().trim()] || [];
  const en = norm(espnName);
  return variants.some(v => en===norm(v) || en.includes(norm(v)) || norm(v).includes(en));
}

// Busca en el scoreboard de hoy un partido "in progress" y devuelve su event.
// Busca TODOS los partidos en vivo (puede haber 0, 1, 2 o más)
async function findAllLiveEvents(){
  const d=new Date();
  const ymd=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const res=await fetch(`${ESPN_PROXY}?type=scoreboard&dates=${ymd}`);
  if(!res.ok) throw new Error('scoreboard '+res.status);
  const js=await res.json();
  const events=js.events||[];
  // Filtrar todos los en curso (type.state === 'in')
  const live=events.filter(e=>{
    const st=e.status&&e.status.type&&e.status.type.state;
    return st==='in';
  });
  return live; // Array vacío si no hay, o con múltiples eventos
}

// Para backward compatibility: devuelve solo el primero
async function findLiveEvent(){
  const all=await findAllLiveEvents();
  return all.length > 0 ? all[0] : null;
}

// Trae el summary completo (eventos, stats, alineaciones) de un event.
async function fetchSummary(eventId){
  const res=await fetch(`${ESPN_PROXY}?type=summary&event=${eventId}`);
  if(!res.ok) throw new Error('summary '+res.status);
  return await res.json();
}

function getLiveKeyEvents(sum, comp){
  const sources = [
    ...(sum?.keyEvents || []),
    ...(sum?.plays || []),
    ...(sum?.details || []),
    ...(comp?.details || [])
  ];

  // Deduplicar eventos por descripción exacta
  const seen = new Set();
  return sources.filter(e=>{
    const txt =
      e.text ||
      e.displayText ||
      e.shortText ||
      e.type?.text ||
      e.type?.description ||
      '';
    
    const trimmed = String(txt).trim();
    if(!trimmed.length || seen.has(trimmed)) return false;
    seen.add(trimmed);
    return true;
  });
}

      let description = descriptionRaw;
      let isHydrationBreak = false;
      if(/drinks break/i.test(description)) { description = '💧 Pausa de Hidratación'; isHydrationBreak = true; }
      
      if(!description.trim()) return;
      
      // Filtrar eventos descriptivos sin valor (delay messages genéricos)
      if(/^delay (in match|over)/.test(description.toLowerCase())) return;
      
      // No mostrar bandera en pausas de hidratación
      const flagHtml = !isHydrationBreak && teamFlag ? `<img src="${teamFlag}" class="flag" alt="">` : '';
      
      // Mantener el minuto incluso en hidratación
      const minDisplay = min;
      
      colEventos+=`<div class="lv-event">
        <span class="lv-ev-min">${minDisplay}</span>
        ${flagHtml}
        <span class="lv-ev-ico">${ico}</span>
        <span>${description}</span>
      </div>`;
            
      
      });
      colEventos+=`</div>`;
    }
  }

  // ===== ESTADÍSTICAS (siempre que existan; va en columna derecha) =====
  // ESPN pone las stats en boxscore.teams[], no en competitors[].statistics
  let colStats='';
  {
    const bsTeams=(sum.boxscore?.teams||[]);
    const bsHome=bsTeams.find(t=>t.homeAway==='home')||bsTeams[0]||{};
    const bsAway=bsTeams.find(t=>t.homeAway==='away')||bsTeams[1]||{};
    const hStats=(bsHome.statistics||home.statistics||[]);
    const aStats=(bsAway.statistics||away.statistics||[]);
    
    // Validación: ambos teams deben tener datos estadísticos
    if(hStats?.length&&aStats?.length){
      const want=[
        {k:'possessionPct',lbl:'Posesión %'},
        {k:'totalShots',lbl:'Tiros'},
        {k:'shotsOnTarget',lbl:'Tiros al arco'},
        {k:'foulsCommitted',lbl:'Faltas'},
        {k:'wonCorners',lbl:'Córners'},
        {k:'yellowCards',lbl:'Amarillas'},
        {k:'redCards',lbl:'Tarjetas rojas'},
        {k:'totalPasses',lbl:'Pases'},
        {k:'passAccuracyPct',lbl:'Precisión pases %'}
      ];
      
      let rows='';
      want.forEach(w=>{
        const hs=hStats.find(s=>s.name===w.k);
        const as=aStats.find(s=>s.name===w.k);
        
        // Omitir si falta alguna estadística (validación segura)
        if(!hs||!as) return;
        
        const hv=parseFloat(hs.displayValue)||0, av=parseFloat(as.displayValue)||0;
        const tot=hv+av;
        const hp=tot>0?(hv/tot*100):50;
        
        rows+=`<div class="lv-stat">
          <div class="lv-stat-top"><span>${hs.displayValue}</span><span>${as.displayValue}</span></div>
          <div class="lv-stat-lbl">${w.lbl}</div>
          <div class="lv-bar"><span class="a" style="width:${hp}%"></span><span class="b" style="width:${100-hp}%"></span></div>
        </div>`;
      });
      
      // Rótulo según estado del partido
      if(rows){
        const reportTitle='ESTADÍSTICAS';
        colStats+=`<div class="lv-section"><h4 style="color:#FFFFFF;text-align:center;font-weight:700">${reportTitle}</h4>${rows}</div>`;
      }
    }
    // Si no hay stats, colStats queda vacío y la columna colapsa (ver ensamblaje abajo)
  }

  // ===== ENSAMBLAJE =====
  // Columna izquierda: marcador (scoreboard) + estadísticas.
  // Columna derecha: jugadas clave.
  // Dos columnas en desktop, apiladas en móvil. Si la derecha está vacía, la izquierda ocupa todo.
  const colIzq=`<div class="lv-col-izq">${colScoreboard}${colStats?`<div class="lv-stats-wrap">${colStats}</div>`:''}</div>`;
  const colDer=colEventos?`<div class="lv-col-der">${colEventos}</div>`:'';
  if(colDer){
    h+=`<div class="lv-cols">${colIzq}${colDer}</div>`;
  } else {
    h+=`<div class="lv-cols solo">${colIzq}</div>`;
  }

  // ===== ALINEACIONES (siempre, si existen) =====
  const rosters=(sum.rosters||[]);
  if(rosters?.length>=2){
    const col=(r)=>{
      const tName=(r.team?.displayName||r.team?.name)||'';
      const logo=(r.team?.logos?.[0]?.href)||(r.team?.logo)||'';
      
      // Validación: preferir titulares, sino primeros 11
      const starters=(r.roster||[]).filter(p=>p.starter);
      const list=(starters.length?starters:(r.roster||[]).slice(0,11));
      
      let pl='';
      list.forEach(p=>{
        const nm=(p.athlete?.displayName||p.athlete?.shortName)||'';
        const num=p.jersey||(p.athlete?.jersey)||'';
        pl+=`<div class="lv-xi-p"><span class="num">${num}</span><span>${nm}</span></div>`;
      });
      
      return `<div class="lv-xi-col"><h5>${logo?`<img src="${logo}" alt="">`:''}${tName}</h5>${pl}</div>`;
    };
    
    h+=`<div class="lv-col-der" style="margin-top:12px"><div class="lv-section"><h4>Alineaciones</h4><div class="lv-xi">${col(rosters[0])}${col(rosters[1])}</div></div></div>`;
  }

  h+=`</div></div>`;
  el.innerHTML=h;
}

// Refresca los detalles del partido en vivo.
async function refreshEnvivo(){
  if(!ENVIVO_EVENT) return;
  try{
    const sum=await fetchSummary(ENVIVO_EVENT);
    renderEnvivo(sum);
    lvSetStatus('Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  }catch(e){
    console.error('Envivo summary error:',e);
    lvSetStatus('No se pudo cargar detalles de ESPN (posible bloqueo CORS). El marcador sigue disponible en Posiciones y Partidos.', true);
  }
}

// Refresca los detalles del segundo partido en vivo
async function refreshEnvivo2(){
  if(!ENVIVO2_EVENT) return;
  try{
    const sum=await fetchSummary(ENVIVO2_EVENT);
    renderEnvivo(sum, 'vEnvivo2'); // Renderiza en el panel 2
    lvSetStatus('Actualizado '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'}), false, 'vEnvivo2');
  }catch(e){
    console.error('Envivo2 summary error:',e);
    lvSetStatus('No se pudo cargar detalles de ESPN (posible bloqueo CORS). El marcador sigue disponible en Posiciones y Partidos.', true, 'vEnvivo2');
  }
}
// ========== checkEnvivo: Detección Inteligente con Persistencia Post-Final ==========
// Comprueba si hay partido en vivo y gestiona la visibilidad del tab EN VIVO.
// Lógica:
// - Mientras hay partido EN VIVO: tab visible, refresco cada 25s
// - Cuando finaliza (isPost): tab visible 10 minutos adicionales (persistencia)
// - Tras 10 min: tab se oculta y vuelve a Posiciones si estaba activo
// - Si hay error ESPN: no rompe nada, tab simplemente no aparece
async function checkEnvivo(){
  const tabBtn=document.getElementById('tab-envivo');
  try{
    const ev=await findLiveEvent();
    
    // ===== CASO 1: Hay evento EN VIVO (in progress) =====
    if(ev){
      ENVIVO_EVENT=ev.id;
      
      // Primera vez que detectamos el partido
      if(!ENVIVO_ACTIVE){
        ENVIVO_ACTIVE=true;
        tabBtn.style.display='';
        tabBtn.click(); // Auto-switch a EN VIVO cuando aparezca
        
        // Limpiar timer anterior si existe
        if(ENVIVO_TIMER) clearInterval(ENVIVO_TIMER);
        
        // Refresco activo mientras hay partido (cada 25s)
        ENVIVO_TIMER=setInterval(refreshEnvivo, 25*1000);
        
        // Limpiar timer de post-final si existe (estamos EN VIVO, no en post)
        if(tabBtn.dataset.postTimer){
          clearTimeout(parseInt(tabBtn.dataset.postTimer));
          tabBtn.dataset.postTimer='';
        }
      }
      
      // Refrescar detalles del partido
      await refreshEnvivo();
      
    // ===== CASO 2: No hay evento EN VIVO (checkEnvivo no encontró nada) =====
    } else {
      // Si estábamos ACTIVOS (había partido), ahora es post-final
      if(ENVIVO_ACTIVE){
        // Parar refresco activo
        ENVIVO_ACTIVE=false;
        if(ENVIVO_TIMER){ clearInterval(ENVIVO_TIMER); ENVIVO_TIMER=null; }
        
        // PERSISTENCIA: Mantener visible 10 minutos tras finalización
        if(!tabBtn.dataset.postTimer){
          tabBtn.dataset.postTimer=setTimeout(()=>{
            // Pasados 10 min: ocultar tab
            tabBtn.style.display='none';
            tabBtn.dataset.postTimer='';
            
            // Si el usuario estaba viendo EN VIVO, volver a Posiciones
            if(tabBtn.classList.contains('active')){
              document.getElementById('tab-tabla').click();
            }
          }, 10*60*1000); // 10 minutos
        }
      } 
      // Si NO estábamos activos, simplemente no mostrar tab
      else {
        tabBtn.style.display='none';
      }
      
      ENVIVO_EVENT=null;
    }
    
  }catch(e){
    console.error('Envivo check error:',e);
    // Graceful degradation: Si ESPN falla, el tab simplemente no aparece
    // El resto de la app continúa normal (Posiciones, Partidos, Grupos sí funcionan)
  }
}

// ========== checkEnvivo2: Detección inteligente del segundo partido EN VIVO ==========
async function checkEnvivo2(){
  const tabBtn=document.getElementById('tab-envivo2');
  try{
    const allLive=await findAllLiveEvents();
    
    // Si hay 2 o más eventos en vivo, el segundo va a EN VIVO 2
    if(allLive.length >= 2){
      const ev=allLive[1]; // Segundo evento
      ENVIVO2_EVENT=ev.id;
      
      if(!ENVIVO2_ACTIVE){
        ENVIVO2_ACTIVE=true;
        tabBtn.style.display='';
        // NO hacer auto-click en EN VIVO 2, dejar que usuario haga click manualmente
        // (para no interrumpir si está viendo EN VIVO 1)
        
        // Limpiar timer anterior si existe
        if(ENVIVO2_TIMER) clearInterval(ENVIVO2_TIMER);
        
        // Refresco activo cada 25s
        ENVIVO2_TIMER=setInterval(refreshEnvivo2, 25*1000);
        
        // Limpiar timer de post-final si existe
        if(tabBtn.dataset.postTimer){
          clearTimeout(parseInt(tabBtn.dataset.postTimer));
          tabBtn.dataset.postTimer='';
        }
      }
      
      // Refrescar detalles
      await refreshEnvivo2();
      
    } else {
      // No hay segundo partido en vivo
      if(ENVIVO2_ACTIVE){
        ENVIVO2_ACTIVE=false;
        if(ENVIVO2_TIMER){ clearInterval(ENVIVO2_TIMER); ENVIVO2_TIMER=null; }
        
        // PERSISTENCIA: Mantener visible 10 minutos tras finalización
        if(!tabBtn.dataset.postTimer){
          tabBtn.dataset.postTimer=setTimeout(()=>{
            tabBtn.style.display='none';
            tabBtn.dataset.postTimer='';
            if(tabBtn.classList.contains('active')){
              document.getElementById('tab-tabla').click();
            }
          }, 10*60*1000);
        }
      } else {
        tabBtn.style.display='none';
      }
      
      ENVIVO2_EVENT=null;
    }
    
  }catch(e){
    console.error('Envivo2 check error:',e);
    // Graceful degradation
  }
}

// Chequeo inicial y cada 60 s (ligero: solo el scoreboard).
// MODO PRUEBA: ?lvtest=EVENTID fuerza el tab con un partido específico (en vivo o no)
// para verificar CORS sin depender de que haya un partido rodando ahora.
(function(){
  const params=new URLSearchParams(location.search);
  const test=params.get('lvtest');
  if(test){
    const tabBtn=document.getElementById('tab-envivo');
    document.getElementById('vEnvivo').innerHTML='<div class="lv-wrap"><div class="lv-status" id="${statusId}"></div><div class="lv-empty">Cargando partido de prueba…</div></div>';
    ENVIVO_EVENT=test.trim();
    ENVIVO_ACTIVE=true;
    tabBtn.style.display='';
    tabBtn.click(); // abre el tab directamente para ver el resultado
    lvSetStatus('MODO PRUEBA · event '+ENVIVO_EVENT+' · verificando ESPN…');
    refreshEnvivo();
    if(ENVIVO_TIMER) clearInterval(ENVIVO_TIMER);
    ENVIVO_TIMER=setInterval(refreshEnvivo, 25*1000);
    return; // en modo prueba no corremos la detección automática
  }
  checkEnvivo();
  checkEnvivo2();
  setInterval(checkEnvivo, 30*1000);
  setInterval(checkEnvivo2, 30*1000);
})();
